# Training configuration

chord_predictor:
  batch_size: 64
  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 1000
  scheduler: "cosine"
  epochs: 50
  label_smoothing: 0.1
  gradient_clip_norm: 1.0
  optimizer: "adamw"

texture_generator:
  batch_size: 32
  gradient_accumulation_steps: 4  # Effective batch size 128
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 2000
  scheduler: "cosine"
  epochs: 100
  label_smoothing: 0.0
  gradient_clip_norm: 1.0
  optimizer: "adamw"

gospel_finetune:
  batch_size: 16
  learning_rate: 5.0e-5            # 10x lower than pretraining
  weight_decay: 0.01
  warmup_steps: 500
  scheduler: "cosine"
  epochs: 30
  data_mix:
    gospel_real: 0.4
    gospel_synthetic: 0.3
    pop909: 0.3

data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  split_by: "song"                  # Avoid leakage
  augmentation:
    transpose_all_keys: true        # 12x multiplier
    tempo_jitter_pct: 0.10          # +/- 10%
    max_seq_len: 256

wandb:
  project: "piano-accomp"
  entity: null                      # Set to your wandb username
  log_interval: 50                  # Steps between logging
