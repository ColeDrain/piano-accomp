# Training configuration

chord_predictor:
  batch_size: 256
  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  scheduler: "cosine"
  epochs: 30
  label_smoothing: 0.1
  gradient_clip_norm: 1.0
  optimizer: "adamw"

texture_generator:
  batch_size: 128
  gradient_accumulation_steps: 2    # Effective batch 256
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 1000
  scheduler: "cosine"
  epochs: 40
  label_smoothing: 0.0
  gradient_clip_norm: 1.0
  optimizer: "adamw"

gospel_finetune:
  batch_size: 16
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  scheduler: "cosine"
  epochs: 30
  data_mix:
    gospel_real: 0.4
    gospel_synthetic: 0.3
    pop909: 0.3

data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  split_by: "song"
  augmentation:
    key_normalize: true         # Normalize to C major / A minor
    transpose_all_keys: false   # No longer needed with key normalization
    tempo_jitter: true          # 5 tempo variants per window
    max_seq_len: 256

wandb:
  project: "piano-accomp"
  entity: null
  log_interval: 50
